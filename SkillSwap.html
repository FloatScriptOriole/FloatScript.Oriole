function ProjectsTab({ displayName, projectsBoard, setProjectsBoard, persistProjectsBoard, passport, setPassport, persistPassport, ledger, setLedger, persistLedger }) {
  const [org, setOrg] = useState("");
  const [title, setTitle] = useState("");
  const [description, setDescription] = useState("");
  const [skill, setSkill] = useState("");
  const [hoursEstimate, setHoursEstimate] = useState(3);
  const [creditReward, setCreditReward] = useState(2);
  const [posting, setPosting] = useState(false);

  async function postProject(e) {
    e.preventDefault();
    if (!org.trim() || !title.trim() || !skill.trim()) return;
    setPosting(true);
    const entry = { id: `cp-${Date.now()}`, org: org.trim(), title: title.trim(), description: description.trim(), skill: skill.trim(), hoursEstimate: Number(hoursEstimate) || 1, creditReward: Number(creditReward) || 1, status: "open", claimedBy: null, ts: Date.now() };
    const next = [entry, ...projectsBoard];
    setProjectsBoard(next);
    await persistProjectsBoard(next);
    setOrg(""); setTitle(""); setDescription(""); setSkill(""); setHoursEstimate(3); setCreditReward(2);
    setPosting(false);
  }

  async function claim(id) {
    if (!displayName) return;
    const next = projectsBoard.map((p) => (p.id === id ? { ...p, status: "claimed", claimedBy: displayName } : p));
    setProjectsBoard(next);
    await persistProjectsBoard(next);
  }

  async function complete(p) {
    const nextBoard = projectsBoard.map((x) => (x.id === p.id ? { ...x, status: "done" } : x));
    setProjectsBoard(nextBoard);
    await persistProjectsBoard(nextBoard);

    const projEntry = { id: `p-${Date.now()}`, name: displayName, title: p.title, skill: p.skill, description: `Community project for ${p.org}: ${p.description}`, ts: Date.now() };
    const nextPassport = { ...passport, projects: [projEntry, ...passport.projects] };
    setPassport(nextPassport);
    await persistPassport(nextPassport);

    const ledgerEntry = { id: `t-${Date.now()}`, from: "Community", to: displayName, hours: p.creditReward, skill: p.skill, note: `Reward for ${p.title}`, status: "released", ts: Date.now() };
    const nextLedger = [ledgerEntry, ...ledger];
    setLedger(nextLedger);
    await persistLedger(nextLedger);
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "24px" }}>
      <Panel>
        <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "6px" }}><Trophy size={16} color={AMBER} /><span style={{ fontWeight: 800, fontSize: "16px" }}>Community Projects</span></div>
        <p style={{ color: CHALK_DIM, fontSize: "13px", margin: 0 }}>Real requests from real organizations. Claim one, build it, and it lands on your Skill Passport as proof — not a practice exercise.</p>
      </Panel>

      <Panel>
        <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "10px" }}><Plus size={15} color={AMBER} /><span style={{ fontWeight: 600, fontSize: "14px" }}>Post a project request</span></div>
        <form onSubmit={postProject} style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr", gap: "8px" }}>
            <input style={inputStyle} placeholder="Organization" value={org} onChange={(e) => setOrg(e.target.value)} />
            <input style={inputStyle} placeholder="Project title" value={title} onChange={(e) => setTitle(e.target.value)} />
          </div>
          <input style={inputStyle} placeholder="What needs doing?" value={description} onChange={(e) => setDescription(e.target.value)} />
          <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: "8px" }}>
            <input style={inputStyle} placeholder="Skill needed" value={skill} onChange={(e) => setSkill(e.target.value)} />
            <input type="number" min="1" style={inputStyle} value={hoursEstimate} onChange={(e) => setHoursEstimate(e.target.value)} placeholder="Est. hours" />
            <input type="number" min="1" style={inputStyle} value={creditReward} onChange={(e) => setCreditReward(e.target.value)} placeholder="Credit reward" />
          </div>
          <button type="submit" disabled={posting} style={{ alignSelf: "flex-start", background: AMBER, color: INK, border: "none", borderRadius: "9999px", padding: "10px 22px", fontSize: "14px", fontWeight: 700, cursor: "pointer" }}>{posting ? "Posting…" : "Post request"}</button>
        </form>
      </Panel>

      <Panel>
        <div style={{ fontWeight: 600, fontSize: "14px", marginBottom: "10px" }}>Open &amp; in-progress projects</div>
        {projectsBoard.length === 0 ? <span style={{ fontSize: "13px", color: CHALK_DIM }}>No project requests yet.</span> : (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: "12px" }}>
            {projectsBoard.map((p) => {
              const mine = displayName && p.claimedBy && p.claimedBy.trim().toLowerCase() === displayName.trim().toLowerCase();
              return (
                <div key={p.id} style={{ background: SURFACE_2, border: `1px solid ${BORDER}`, borderRadius: "12px", padding: "12px", display: "flex", flexDirection: "column", gap: "6px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ fontWeight: 600, fontSize: "13px" }}>{p.title}</span><span style={{ fontSize: "11px", color: CHALK_DIM }}>{p.org}</span></div>
                  <span style={{ fontSize: "12px", color: CHALK_DIM }}>{p.description}</span>
                  <div style={{ display: "flex", gap: "8px", fontSize: "11px", color: AMBER, fontFamily: "'Space Mono', monospace" }}><span>{p.skill}</span><span>· ~{p.hoursEstimate}h</span><span>· {p.creditReward}h reward</span></div>
                  <span style={{ fontSize: "11px", color: p.status === "open" ? SAGE : p.status === "claimed" ? AMBER : CHALK_DIM }}>{p.status === "open" ? "Open" : p.status === "claimed" ? `Claimed by ${p.claimedBy}` : "Completed"}</span>
                  {p.status === "open" && <button onClick={() => claim(p.id)} disabled={!displayName} style={{ background: "transparent", border: `1px solid ${AMBER}`, color: AMBER, borderRadius: "9999px", padding: "6px 14px", fontSize: "13px", cursor: "pointer" }}>{displayName ? "Claim this project" : "Set your name to claim"}</button>}
                  {p.status === "claimed" && mine && <button onClick={() => complete(p)} style={{ background: AMBER, color: INK, border: "none", borderRadius: "9999px", padding: "6px 14px", fontSize: "13px", fontWeight: 600, cursor: "pointer" }}>Mark complete</button>}
                </div>
              );
            })}
          </div>
        )}
      </Panel>
    </div>
  );
}

// ============================== LEARN TAB ==============================

function LearnTab({ displayName, passport, setPassport, persistPassport, allSkills }) {
  const [lessonId, setLessonId] = useState(LESSONS[0].id);
  const lesson = LESSONS.find((l) => l.id === lessonId);

  const [playing, setPlaying] = useState(false);
  const [progress, setProgress] = useState(0);
  const [answered, setAnswered] = useState({});
  const [currentCheckpoint, setCurrentCheckpoint] = useState(null);
  const [quizChoice, setQuizChoice] = useState(null);
  const [codeInput, setCodeInput] = useState("");
  const [codeResult, setCodeResult] = useState(null);
  const [savedToPassport, setSavedToPassport] = useState(false);
  const timerRef = useRef(null);

  function resetLesson(id) {
    setLessonId(id); setPlaying(false); setProgress(0); setAnswered({});
    setCurrentCheckpoint(null); setQuizChoice(null); setCodeInput(""); setCodeResult(null); setSavedToPassport(false);
  }

  useEffect(() => {
    if (!playing) return;
    timerRef.current = setInterval(() => {
      setProgress((p) => {
        const next = Math.min(p + 2, 100);
        const cpIndex = lesson.checkpoints.findIndex((cp, i) => next >= cp.atPercent && !answered[i]);
        if (cpIndex !== -1) {
          setPlaying(false);
          setCurrentCheckpoint(cpIndex);
          setCodeInput(lesson.checkpoints[cpIndex].starter || "");
          return lesson.checkpoints[cpIndex].atPercent;
        }
        return next;
      });
    }, 220);
    return () => clearInterval(timerRef.current);
  }, [playing, lesson, answered]);

  useEffect(() => () => clearInterval(timerRef.current), []);

  const allAnswered = lesson.checkpoints.every((_, i) => answered[i] !== undefined);
  const score = Object.values(answered).filter(Boolean).length;
  const complete = progress >= 100 && allAnswered;

  function submitQuiz() {
    if (quizChoice === null || currentCheckpoint === null) return;
    const cp = lesson.checkpoints[currentCheckpoint];
    setAnswered((prev) => ({ ...prev, [currentCheckpoint]: quizChoice === cp.correct }));
  }
  function submitCode() {
    if (currentCheckpoint === null) return;
    const cp = lesson.checkpoints[currentCheckpoint];
    try {
      const pass = cp.check(codeInput);
      setCodeResult(pass ? "pass" : "fail");
      if (pass) setAnswered((prev) => ({ ...prev, [currentCheckpoint]: true }));
    } catch (e) { setCodeResult("error"); }
  }
  function continueLesson() { setCurrentCheckpoint(null); setQuizChoice(null); setCodeResult(null); setPlaying(true); }

  async function saveAssessment() {
    if (!displayName) return;
    const entry = { id: `a-${Date.now()}`, name: displayName, skill: lesson.skill, score, total: lesson.checkpoints.length, title: lesson.title, ts: Date.now() };
    const next = { ...passport, assessments: [entry, ...passport.assessments] };
    setPassport(next);
    await persistPassport(next);
    setSavedToPassport(true);
  }

  const cp = currentCheckpoint !== null ? lesson.checkpoints[currentCheckpoint] : null;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "28px" }}>
      <Panel>
        <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "6px" }}><GraduationCap size={16} color={AMBER} /><span style={{ fontWeight: 800, fontSize: "16px" }}>Interactive lesson</span></div>
        <p style={{ color: CHALK_DIM, fontSize: "13px", margin: "0 0 14px" }}>Real checkpoints, not passive playback: quizzes and a live coding challenge pause the video until you engage.</p>

        <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", marginBottom: "16px" }}>
          {LESSONS.map((l) => <button key={l.id} onClick={() => resetLesson(l.id)} style={pillBtn(l.id === lessonId)}>{l.title}</button>)}
        </div>

        <div style={{ background: SURFACE_2, border: `1px solid ${BORDER}`, borderRadius: "16px", padding: "20px", display: "flex", flexDirection: "column", gap: "14px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}><span style={{ fontSize: "14px", fontWeight: 600 }}>{lesson.title}</span><CategoryTag id={lesson.skill === "Python" ? "tech" : "music"} small /></div>
          <p style={{ fontSize: "13px", color: CHALK_DIM, margin: 0 }}>{lesson.intro}</p>
          <div style={{ height: "8px", borderRadius: "9999px", background: BORDER, overflow: "hidden" }}><div style={{ height: "100%", width: `${progress}%`, background: `linear-gradient(90deg, ${AMBER}, ${CYAN})`, transition: "width 200ms linear", borderRadius: "9999px" }} /></div>

          {!cp && !complete && (
            <button onClick={() => setPlaying((p) => !p)} style={{ alignSelf: "flex-start", display: "flex", alignItems: "center", gap: "8px", background: AMBER, color: INK, border: "none", borderRadius: "12px", padding: "8px 16px", fontWeight: 600, fontSize: "13px", cursor: "pointer" }}>
              {playing ? <Pause size={14} /> : <Play size={14} />} {playing ? "Pause" : progress === 0 ? "Play lesson" : "Resume"}
            </button>
          )}

          {cp && cp.type === "quiz" && (
            <div style={{ background: SURFACE, border: `1px solid ${BORDER}`, borderRadius: "12px", padding: "14px", display: "flex", flexDirection: "column", gap: "10px" }}>
              <span style={{ fontSize: "12px", color: AMBER, fontFamily: "'Space Mono', monospace" }}>⏸ checkpoint · quiz</span>
              <span style={{ fontSize: "14px" }}>{cp.question}</span>
              <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
                {cp.options.map((opt, i) => (
                  <button key={i} onClick={() => setQuizChoice(i)} style={{ textAlign: "left", padding: "10px 14px", borderRadius: "12px", cursor: "pointer", border: `1.5px solid ${quizChoice === i ? AMBER : BORDER}`, background: quizChoice === i ? `${AMBER}12` : SURFACE, color: CHALK, fontSize: "14px", fontWeight: quizChoice === i ? 700 : 500, transition: "all 200ms" }}>{opt}</button>
                ))}
              </div>
              {answered[currentCheckpoint] === undefined ? (
                <button onClick={submitQuiz} disabled={quizChoice === null} style={{ alignSelf: "flex-start", background: AMBER, color: INK, border: "none", borderRadius: "9999px", padding: "10px 22px", fontSize: "14px", fontWeight: 700, cursor: "pointer" }}>Check answer</button>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                  <span style={{ fontSize: "13px", color: answered[currentCheckpoint] ? SAGE : ROSE }}>{answered[currentCheckpoint] ? "Correct — nice work." : `Not quite. The answer was: ${cp.options[cp.correct]}`}</span>
                  <button onClick={continueLesson} style={{ alignSelf: "flex-start", background: "transparent", border: `1px solid ${BORDER}`, color: CHALK, borderRadius: "12px", padding: "6px 12px", fontSize: "13px", cursor: "pointer" }}>Continue ▸</button>
                </div>
              )}
            </div>
          )}

          {cp && cp.type === "code" && (
            <div style={{ background: SURFACE, border: `1px solid ${BORDER}`, borderRadius: "12px", padding: "14px", display: "flex", flexDirection: "column", gap: "10px" }}>
              <span style={{ fontSize: "12px", color: AMBER, fontFamily: "'Space Mono', monospace" }}>⏸ checkpoint · mini coding challenge</span>
              <span style={{ fontSize: "14px" }}>{cp.prompt}</span>
              <textarea value={codeInput} onChange={(e) => setCodeInput(e.target.value)} rows={5} style={{ ...inputStyle, fontFamily: "'Space Mono', monospace", fontSize: "13px", resize: "vertical" }} />
              {answered[currentCheckpoint] ? (
                <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                  <span style={{ fontSize: "13px", color: SAGE }}>✓ Passed — instant feedback, no waiting for a grader.</span>
                  <button onClick={continueLesson} style={{ alignSelf: "flex-start", background: "transparent", border: `1px solid ${BORDER}`, color: CHALK, borderRadius: "12px", padding: "6px 12px", fontSize: "13px", cursor: "pointer" }}>Continue ▸</button>
                </div>
              ) : (
                <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
                  <button onClick={submitCode} style={{ background: AMBER, color: INK, border: "none", borderRadius: "9999px", padding: "10px 22px", fontSize: "14px", fontWeight: 700, cursor: "pointer" }}>Run code</button>
                  {codeResult === "fail" && <span style={{ fontSize: "12px", color: ROSE }}>Not passing yet — check your logic and try again.</span>}
                  {codeResult === "error" && <span style={{ fontSize: "12px", color: ROSE }}>That code didn't run — check for syntax errors.</span>}
                </div>
              )}
            </div>
          )}

          {complete && (
            <div style={{ background: SURFACE, border: `1px solid ${SAGE}`, borderRadius: "12px", padding: "14px", display: "flex", flexDirection: "column", gap: "10px" }}>
              <span style={{ fontSize: "14px", fontWeight: 600, color: SAGE }}>Lesson complete — {score}/{lesson.checkpoints.length} checkpoints correct</span>
              <div style={{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
                <button onClick={() => resetLesson(lesson.id)} style={{ display: "flex", alignItems: "center", gap: "6px", background: "transparent", border: `1px solid ${BORDER}`, color: CHALK, borderRadius: "12px", padding: "6px 12px", fontSize: "12px", cursor: "pointer" }}><RotateCcw size={12} /> Retake</button>
                <button onClick={saveAssessment} disabled={!displayName || savedToPassport} style={{ display: "flex", alignItems: "center", gap: "6px", background: AMBER, color: INK, border: "none", borderRadius: "12px", padding: "6px 12px", fontSize: "12px", fontWeight: 600, cursor: displayName && !savedToPassport ? "pointer" : "default", opacity: !displayName || savedToPassport ? 0.6 : 1 }}><FolderCheck size={12} /> {savedToPassport ? "Saved to passport" : displayName ? "Save as verified assessment" : "Set your name to save"}</button>
              </div>
            </div>
          )}
        </div>
      </Panel>

      <MentorPanel displayName={displayName} passport={passport} allSkills={allSkills} />
    </div>
  );
}

function MentorPanel({ displayName, passport, allSkills }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [pendingQuiz, setPendingQuiz] = useState(null);
  const weakSkills = passport.assessments.filter((a) => a.score < a.total).map((a) => a.skill);

  function send(text) {
    const content = (text || input).trim();
    if (!content) return;
    setMessages((prev) => [...prev, { role: "user", text: content }]);
    setInput("");
    const ctx = { weakSkills, allSkills: [...new Set(allSkills)] };
    const result = localMentorReply(content, ctx, pendingQuiz);
    setMessages((prev) => [...prev, { role: "assistant", text: result.text }]);
    if (result.newPending) setPendingQuiz(result.newPending);
    if (result.clearsPending) setPendingQuiz(null);
  }

  return (
    <Panel>
      <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "6px" }}><Brain size={16} color={SAGE} /><span style={{ fontWeight: 800, fontSize: "16px" }}>Study assistant</span></div>
      <p style={{ color: CHALK_DIM, fontSize: "13px", margin: "0 0 14px" }}>
        Quizzes you, suggests what's next, and explains a handful of topics from a local knowledge base. This runs entirely in your browser — no external API, no key, no cost — so it's rule-based rather than a real conversational AI.
      </p>
      <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", marginBottom: "12px" }}>
        <button onClick={() => send("Quiz me on something from the skills I've been working on.")} style={{ fontSize: "12px", border: `1px solid ${BORDER}`, background: "transparent", color: CHALK, borderRadius: "999px", padding: "5px 12px", cursor: "pointer" }}>Quiz me</button>
        <button onClick={() => send("What should I study next?")} style={{ fontSize: "12px", border: `1px solid ${BORDER}`, background: "transparent", color: CHALK, borderRadius: "999px", padding: "5px 12px", cursor: "pointer" }}>What should I study next?</button>
        <button onClick={() => send("Explain loops")} style={{ fontSize: "12px", border: `1px solid ${BORDER}`, background: "transparent", color: CHALK, borderRadius: "999px", padding: "5px 12px", cursor: "pointer" }}>Explain something</button>
      </div>
      <div style={{ background: SURFACE_2, border: `1px solid ${BORDER}`, borderRadius: "12px", padding: "12px", display: "flex", flexDirection: "column", gap: "10px", maxHeight: "260px", overflowY: "auto", marginBottom: "10px" }}>
        {messages.length === 0 ? <span style={{ fontSize: "13px", color: CHALK_DIM }}>Try "quiz me", "what should I study next", or "explain chords".</span> : messages.map((m, i) => (
          <div key={i} style={{ display: "flex", gap: "8px", alignItems: "flex-start" }}>
            {m.role === "assistant" ? <Bot size={14} color={SAGE} style={{ marginTop: "2px", flexShrink: 0 }} /> : <span style={{ width: "14px", flexShrink: 0 }} />}
            <span style={{ fontSize: "13px", color: m.role === "assistant" ? CHALK : CHALK_DIM, whiteSpace: "pre-wrap" }}>{m.text}</span>
          </div>
        ))}
      </div>
      <div style={{ display: "flex", gap: "6px" }}>
        <input style={{ ...inputStyle, flex: 1 }} placeholder={pendingQuiz ? "Reply with a number…" : "Ask your study assistant…"} value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") send(); }} />
        <button onClick={() => send()} style={{ background: AMBER, color: INK, border: "none", borderRadius: "12px", padding: "0 14px", cursor: "pointer", display: "flex", alignItems: "center" }}><Send size={14} /></button>
      </div>
    </Panel>
  );
}

// ============================== SKILL TREE ==============================

function SkillTree({ skill, myListings, assessments, projects, endorsements, ledger, viewerKey }) {
  if (!skill) return null;
  const hasMention = myListings.some((l) => related(l.offered, skill)) || assessments.some((a) => related(a.skill, skill)) || projects.some((p) => related(p.skill, skill));
  const hasVerified = assessments.some((a) => related(a.skill, skill) && a.score >= a.total);
  const hasProject = projects.some((p) => related(p.skill, skill));
  const hasEndorsement = endorsements.some((e) => related(e.skill, skill));
  const hasTaught = ledger.some((e) => e.status === "released" && e.to.trim().toLowerCase() === viewerKey && related(e.skill, skill));
  const checks = [hasMention, hasVerified, hasProject, hasEndorsement, hasTaught];

  return (
    <div style={{ display: "flex", alignItems: "center", overflowX: "auto", padding: "6px 2px" }}>
      {TREE_STAGES.map((stage, i) => {
        const done = checks[i];
        const unlocked = i === 0 || checks[i - 1];
        return (
          <div key={stage.id} style={{ display: "flex", alignItems: "center", flexShrink: 0 }}>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: "6px", width: "90px" }}>
              <div style={{ width: "36px", height: "36px", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", background: done ? SAGE : unlocked ? `${AMBER}18` : BORDER, border: `2px solid ${done ? SAGE : unlocked ? AMBER : BORDER}`, transition: "all 200ms", boxShadow: done ? `0 2px 8px ${SAGE}44` : "none" }}>
                {done ? <CheckCircle2 size={16} color={INK} /> : unlocked ? <Sparkles size={14} color={AMBER} /> : <Lock size={14} color={CHALK_DIM} />}
              </div>
              <span style={{ fontSize: "11px", textAlign: "center", color: done ? SAGE : unlocked ? CHALK : CHALK_DIM, lineHeight: 1.3, fontWeight: done ? 700 : 500 }}>{stage.label}</span>
            </div>
            {i < TREE_STAGES.length - 1 && <div style={{ width: "24px", height: "2px", background: checks[i] ? SAGE : BORDER, flexShrink: 0, transition: "background 200ms" }} />}
          </div>
        );
      })}
    </div>
  );
}

// ============================== PASSPORT TAB ==============================

function PassportTab({ listings, ratings, ratingStatsByName, passport, setPassport, persistPassport, displayName, allNames, jumpToName, creditsFor, noShowReports, ledger }) {
  const [viewName, setViewName] = useState(displayName || "");
  useEffect(() => { if (displayName && !viewName) setViewName(displayName); }, [displayName]);
  useEffect(() => { if (jumpToName) setViewName(jumpToName); }, [jumpToName]);

  const [projTitle, setProjTitle] = useState("");
  const [projSkill, setProjSkill] = useState("");
  const [projDesc, setProjDesc] = useState("");
  const [endorseText, setEndorseText] = useState("");
  const [endorseSkill, setEndorseSkill] = useState("");
  const [aiSummary, setAiSummary] = useState("");
  const [treeSkill, setTreeSkill] = useState("");
  const [copied, setCopied] = useState(false);

  const [hireRequests, setHireRequests] = useState([]);
  const [hireLoading, setHireLoading] = useState(false);
  const [hireCompany, setHireCompany] = useState("");
  const [hireMessage, setHireMessage] = useState("");
  const [hireSending, setHireSending] = useState(false);
  const [hireSent, setHireSent] = useState(false);

  const key = viewName.trim().toLowerCase();
  const myListings = listings.filter((l) => l.name.trim().toLowerCase() === key);
  const projects = passport.projects.filter((p) => p.name.trim().toLowerCase() === key);
  const assessments = passport.assessments.filter((a) => a.name.trim().toLowerCase() === key);
  const endorsements = passport.endorsements.filter((e) => e.name.trim().toLowerCase() === key);
  const stat = ratingStatsByName[key];
  const credits = creditsFor(viewName);
  const noShows = noShowReports.filter((r) => r.reportedName.trim().toLowerCase() === key);
  const disputes = ledger.filter((e) => e.status === "disputed" && (e.from.trim().toLowerCase() === key || e.to.trim().toLowerCase() === key));

  const skillsMastered = useMemo(() => {
    const set = new Set();
    myListings.forEach((l) => set.add(l.offered));
    assessments.filter((a) => a.score >= a.total).forEach((a) => set.add(a.skill));
    projects.forEach((p) => set.add(p.skill));
    return Array.from(set);
  }, [myListings, assessments, projects]);

  useEffect(() => { if (!treeSkill && skillsMastered.length > 0) setTreeSkill(skillsMastered[0]); }, [skillsMastered]);

  const workHistory = useMemo(() => {
    const events = myListings.map((l) => ({ ts: l.ts, text: `Listed a swap: ${l.offered} ⇄ ${l.wanted}` }));
    const received = ratings.filter((r) => r.aboutName.trim().toLowerCase() === key).map((r) => ({ ts: r.ts, text: `Completed a swap — rated ${r.stars}★ by ${r.fromName}` }));
    const taught = ledger.filter((e) => e.status === "released" && e.to.trim().toLowerCase() === key).map((e) => ({ ts: e.ts, text: `Taught ${e.skill} for ${e.hours}h credit` }));
    return [...events, ...received, ...taught].sort((a, b) => b.ts - a.ts);
  }, [myListings, ratings, ledger, key]);

  const isSelf = displayName && viewName.trim().toLowerCase() === displayName.trim().toLowerCase();
  const hasData = myListings.length > 0 || projects.length > 0 || assessments.length > 0;

  useEffect(() => {
    if (!isSelf || !key) return;
    setHireLoading(true);
    const q = query(collection(db, "hire_requests", key, "requests"), orderBy("ts", "desc"));
    const unsub = onSnapshot(q, (snap) => {
      setHireRequests(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
      setHireLoading(false);
    }, () => { setHireRequests([]); setHireLoading(false); });
    return () => unsub();
  }, [isSelf, key]);

  async function sendHireRequest(e) {
    e.preventDefault();
    if (!hireMessage.trim() || !displayName) return;
    setHireSending(true);
    try {
      await addDoc(collection(db, "hire_requests", key, "requests"), {
        from: displayName,
        company: hireCompany.trim(),
        message: hireMessage.trim(),
        ts: Date.now(),
      });
      setHireSent(true); setHireMessage(""); setHireCompany("");
    } catch (e) {} finally { setHireSending(false); }
  }

  async function addProject(e) {
    e.preventDefault();
    if (!viewName.trim() || !projTitle.trim() || !projSkill.trim()) return;
    const entry = { id: `p-${Date.now()}`, name: viewName.trim(), title: projTitle.trim(), skill: projSkill.trim(), description: projDesc.trim(), ts: Date.now() };
    const next = { ...passport, projects: [entry, ...passport.projects] };
    setPassport(next);
    await persistPassport(next);
    setProjTitle(""); setProjSkill(""); setProjDesc("");
  }

  async function addEndorsement(e) {
    e.preventDefault();
    if (!viewName.trim() || !endorseText.trim() || !displayName) return;
    const entry = { id: `e-${Date.now()}`, name: viewName.trim(), from: displayName, skill: endorseSkill.trim() || "General", text: endorseText.trim(), ts: Date.now() };
    const next = { ...passport, endorsements: [entry, ...passport.endorsements] };
    setPassport(next);
    await persistPassport(next);
    setEndorseText(""); setEndorseSkill("");
  }

  function generateSummary() {
    const profileData = { name: viewName, skillsMastered, projects, assessments, endorsements: endorsements.map((e) => e.text), rating: stat };
    setAiSummary(generateLocalSummary(profileData));
  }

  function copyBadge() {
    const lines = [
      `${viewName} — SkillSwap Passport`,
      skillsMastered.length ? `Skills: ${skillsMastered.join(", ")}` : null,
      `${projects.length} project(s) built · ${assessments.filter((a) => a.score >= a.total).length} verified assessment(s)`,
      stat ? `${stat.avg.toFixed(1)}★ across ${stat.count} swap(s)` : null,
      noShows.length === 0 ? "0 no-show reports" : `${noShows.length} no-show report(s)`,
      aiSummary || null,
    ].filter(Boolean).join("\n");
    if (navigator.clipboard) {
      navigator.clipboard.writeText(lines).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); }).catch(() => {});
    }
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "24px" }}>
      <Panel>
        <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "10px" }}><Briefcase size={16} color={AMBER} /><span style={{ fontWeight: 800, fontSize: "16px" }}>Skill Passport</span></div>
        <div style={{ display: "flex", alignItems: "center", gap: "10px", flexWrap: "wrap" }}>
          <span style={{ fontSize: "12px", color: CHALK_DIM, fontFamily: "'Space Mono', monospace" }}>viewing</span>
          <input list="ss-names" value={viewName} onChange={(e) => setViewName(e.target.value)} placeholder="Enter a name…" style={{ ...inputStyle, width: "200px" }} />
          <datalist id="ss-names">{allNames.map((n) => <option key={n} value={n} />)}</datalist>
          {!isSelf && displayName && <span style={{ fontSize: "11px", color: CHALK_DIM }}>(viewing as employer would)</span>}
        </div>
      </Panel>

      {!viewName.trim() ? (
        <Panel><span style={{ color: CHALK_DIM, fontSize: "13px" }}>Enter a name above to view a passport.</span></Panel>
      ) : (
        <>
          {isSelf && (
            <Panel>
              <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "10px" }}><Building2 size={15} color={AMBER} /><span style={{ fontWeight: 600, fontSize: "14px" }}>Hiring interest</span></div>
              {hireLoading ? <span style={{ fontSize: "13px", color: CHALK_DIM }}>Checking for messages…</span> : hireRequests.length === 0 ? (
                <span style={{ fontSize: "13px", color: CHALK_DIM }}>No employers have reached out yet — get listed with skills and projects to show up in Hire searches.</span>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                  {hireRequests.map((h) => (
                    <div key={h.id} style={{ borderLeft: `2px solid ${AMBER}`, paddingLeft: "10px" }}>
                      <div style={{ fontSize: "13px", fontWeight: 600 }}>{h.from}{h.company ? ` · ${h.company}` : ""}</div>
                      <div style={{ fontSize: "12px", color: CHALK_DIM }}>{h.message}</div>
                      <div style={{ fontSize: "11px", color: CHALK_DIM }}>{timeAgo(h.ts)}</div>
                    </div>
                  ))}
                </div>
              )}
            </Panel>
          )}

          <Panel>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: "12px" }}>
              <div>
                <span style={{ fontSize: "20px", fontWeight: 700 }}>{viewName}</span>
                {stat && <div style={{ display: "flex", alignItems: "center", gap: "5px", marginTop: "4px", fontSize: "13px", color: CHALK_DIM }}><Star size={13} color={AMBER} fill={AMBER} />{stat.avg.toFixed(1)} average · {stat.count} completed swap{stat.count > 1 ? "s" : ""}</div>}
                <div style={{ display: "flex", alignItems: "center", gap: "5px", marginTop: "4px", fontSize: "12px", color: AMBER, fontFamily: "'Space Mono', monospace" }}><Coins size={12} /> {credits.balance.toFixed(1)}h banked</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: "28px", fontWeight: 700, color: AMBER, fontFamily: "'Space Mono', monospace" }}>{projects.length}</div>
                <div style={{ fontSize: "11px", color: CHALK_DIM, maxWidth: "16ch" }}>real projects built &amp; proven — not hours watched</div>
              </div>
            </div>

            <div style={{ marginTop: "16px", display: "flex", flexWrap: "wrap", gap: "6px" }}>
              {skillsMastered.length === 0 ? <span style={{ fontSize: "12px", color: CHALK_DIM }}>No mastered skills tracked yet.</span> : skillsMastered.map((s) => (
                <span key={s} style={{ fontSize: "12px", fontFamily: "'Space Mono', monospace", color: SAGE, border: `1px solid ${SAGE}55`, background: `${SAGE}15`, borderRadius: "999px", padding: "3px 10px" }}>{s}</span>
              ))}
            </div>

            <div style={{ marginTop: "16px", borderTop: `1px solid ${BORDER}`, paddingTop: "14px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: "8px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "6px", fontSize: "12px", color: noShows.length === 0 && disputes.length === 0 ? SAGE : ROSE }}>
                <ShieldCheck size={13} /> {noShows.length} no-show report{noShows.length === 1 ? "" : "s"} · {disputes.length} open dispute{disputes.length === 1 ? "" : "s"}
              </div>
              <button onClick={copyBadge} style={{ display: "flex", alignItems: "center", gap: "6px", background: "transparent", border: `1px solid ${BORDER}`, color: CHALK, borderRadius: "9999px", padding: "6px 14px", fontSize: "13px", cursor: "pointer" }}>
                {copied ? <><Copy size={12} /> Copied</> : <><Share2 size={12} /> Copy shareable badge</>}
              </button>
            </div>

            {skillsMastered.length > 0 && (
              <div style={{ marginTop: "16px", borderTop: `1px solid ${BORDER}`, paddingTop: "14px" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "8px", flexWrap: "wrap", gap: "8px" }}>
                  <span style={{ fontSize: "13px", fontWeight: 600 }}>Skill tree</span>
                  <select style={{ ...inputStyle, padding: "4px 8px", fontSize: "11px", appearance: "auto" }} value={treeSkill} onChange={(e) => setTreeSkill(e.target.value)}>
                    {skillsMastered.map((s) => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
                <SkillTree skill={treeSkill} myListings={myListings} assessments={assessments} projects={projects} endorsements={endorsements} ledger={ledger} viewerKey={key} />
              </div>
            )}

            <div style={{ marginTop: "16px", borderTop: `1px solid ${BORDER}`, paddingTop: "14px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "8px" }}>
                <span style={{ fontSize: "13px", fontWeight: 600 }}>Strengths summary</span>
                <button onClick={generateSummary} disabled={!hasData} style={{ fontSize: "11px", background: "transparent", border: `1px solid ${BORDER}`, color: hasData ? CHALK : CHALK_DIM, borderRadius: "999px", padding: "4px 10px", cursor: hasData ? "pointer" : "default" }}>Generate summary</button>
              </div>
              {!hasData && <span style={{ fontSize: "12px", color: CHALK_DIM }}>Add listings, projects, or assessments first so there's data to summarize.</span>}
              {aiSummary && <p style={{ fontSize: "13px", color: CHALK_DIM, lineHeight: 1.6, margin: 0 }}>{aiSummary}</p>}
              <p style={{ fontSize: "10px", color: CHALK_DIM, margin: "6px 0 0" }}>Built locally from your passport data — no external API involved.</p>
            </div>
          </Panel>

          {!isSelf && (
            <Panel>
              <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "10px" }}><Building2 size={15} color={AMBER} /><span style={{ fontWeight: 600, fontSize: "14px" }}>Request to hire</span></div>
              {!displayName ? <span style={{ fontSize: "13px", color: CHALK_DIM }}>Set your name at the top of the page to reach out to {viewName}.</span> : hireSent ? (
                <span style={{ fontSize: "13px", color: SAGE }}>Message sent — {viewName} will see it on their Skill Passport.</span>
              ) : (
                <form onSubmit={sendHireRequest} style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                  <input style={inputStyle} placeholder="Company or team (optional)" value={hireCompany} onChange={(e) => setHireCompany(e.target.value)} />
                  <textarea rows={3} style={{ ...inputStyle, resize: "vertical" }} placeholder={`Tell ${viewName} what you're hiring for…`} value={hireMessage} onChange={(e) => setHireMessage(e.target.value)} />
                  <button type="submit" disabled={hireSending || !hireMessage.trim()} style={{ alignSelf: "flex-start", background: AMBER, color: INK, border: "none", borderRadius: "12px", padding: "7px 14px", fontSize: "12px", fontWeight: 600, cursor: "pointer", opacity: hireSending || !hireMessage.trim() ? 0.6 : 1 }}>{hireSending ? "Sending…" : "Send request"}</button>
                </form>
              )}
            </Panel>
          )}

          <Panel>
            <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "10px" }}><Layers size={15} color={AMBER} /><span style={{ fontWeight: 600, fontSize: "14px" }}>Projects completed — "Guaranteed Skill"</span></div>
            <p style={{ fontSize: "12px", color: CHALK_DIM, margin: "0 0 12px" }}>Real, built projects — proof of skill instead of a claim of hours watched.</p>
            {projects.length === 0 ? <span style={{ fontSize: "13px", color: CHALK_DIM }}>No projects logged yet.</span> : (
              <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                {projects.map((p) => (
                  <div key={p.id} style={{ borderLeft: `2px solid ${AMBER}`, paddingLeft: "10px" }}>
                    <div style={{ fontSize: "13px", fontWeight: 600 }}>{p.title} <span style={{ color: CHALK_DIM, fontWeight: 400 }}>· {p.skill}</span></div>
                    {p.description && <div style={{ fontSize: "12px", color: CHALK_DIM }}>{p.description}</div>}
                    <div style={{ fontSize: "11px", color: CHALK_DIM }}>{timeAgo(p.ts)}</div>
                  </div>
                ))}
              </div>
            )}
            {isSelf && (
              <form onSubmit={addProject} style={{ marginTop: "14px", display: "flex", flexDirection: "column", gap: "8px", borderTop: `1px solid ${BORDER}`, paddingTop: "12px" }}>
                <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: "8px" }}>
                  <input style={inputStyle} placeholder="Project title" value={projTitle} onChange={(e) => setProjTitle(e.target.value)} />
                  <input style={inputStyle} placeholder="Skill" value={projSkill} onChange={(e) => setProjSkill(e.target.value)} />
                </div>
                <input style={inputStyle} placeholder="Short description (optional)" value={projDesc} onChange={(e) => setProjDesc(e.target.value)} />
                <button type="submit" style={{ alignSelf: "flex-start", background: AMBER, color: INK, border: "none", borderRadius: "12px", padding: "7px 14px", fontSize: "12px", fontWeight: 600, cursor: "pointer" }}>Add project</button>
              </form>
            )}
          </Panel>

          <Panel>
            <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "10px" }}><Award size={15} color={AMBER} /><span style={{ fontWeight: 600, fontSize: "14px" }}>Verified assessments</span></div>
            {assessments.length === 0 ? <span style={{ fontSize: "13px", color: CHALK_DIM }}>No assessments completed yet — try a lesson in the Learn tab.</span> : (
              <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                {assessments.map((a) => (
                  <div key={a.id} style={{ display: "flex", justifyContent: "space-between", fontSize: "13px" }}><span>{a.title} <span style={{ color: CHALK_DIM }}>· {a.skill}</span></span><span style={{ color: a.score >= a.total ? SAGE : CHALK_DIM }}>{a.score}/{a.total} {a.score >= a.total ? "✓ verified" : ""}</span></div>
                ))}
              </div>
            )}
          </Panel>

          <Panel>
            <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "10px" }}><Sparkles size={15} color={SAGE} /><span style={{ fontWeight: 600, fontSize: "14px" }}>Instructor endorsements</span></div>
            {endorsements.length === 0 ? <span style={{ fontSize: "13px", color: CHALK_DIM }}>No endorsements yet.</span> : (
              <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                {endorsements.map((e) => (
                  <div key={e.id} style={{ fontSize: "13px" }}><span style={{ color: CHALK_DIM }}>"{e.text}"</span><div style={{ fontSize: "11px", color: CHALK_DIM, marginTop: "2px" }}>— {e.from}, on {e.skill}</div></div>
                ))}
              </div>
            )}
            {displayName && !isSelf && (
              <form onSubmit={addEndorsement} style={{ marginTop: "14px", display: "flex", flexDirection: "column", gap: "8px", borderTop: `1px solid ${BORDER}`, paddingTop: "12px" }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr", gap: "8px" }}>
                  <input style={inputStyle} placeholder="Skill (optional)" value={endorseSkill} onChange={(e) => setEndorseSkill(e.target.value)} />
                  <input style={inputStyle} placeholder={`Endorse ${viewName}…`} value={endorseText} onChange={(e) => setEndorseText(e.target.value)} />
                </div>
                <button type="submit" style={{ alignSelf: "flex-start", background: AMBER, color: INK, border: "none", borderRadius: "12px", padding: "7px 14px", fontSize: "12px", fontWeight: 600, cursor: "pointer" }}>Add endorsement</button>
              </form>
            )}
          </Panel>

          <Panel>
            <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "10px" }}><Clock size={15} color={CHALK_DIM} /><span style={{ fontWeight: 600, fontSize: "14px" }}>Work history on the platform</span></div>
            {workHistory.length === 0 ? <span style={{ fontSize: "13px", color: CHALK_DIM }}>No activity yet.</span> : (
              <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
                {workHistory.map((h, i) => <div key={i} style={{ fontSize: "12px", color: CHALK_DIM, display: "flex", justifyContent: "space-between" }}><span>{h.text}</span><span>{timeAgo(h.ts)}</span></div>)}
              </div>
            )}
          </Panel>
        </>
      )}
    </div>
  );
}

// ============================== HIRE TAB ==============================

function HireTab({ allNames, listings, passport, ratingStatsByName, onView }) {
  const [q, setQ] = useState("");

  const profiles = useMemo(() => {
    return allNames.map((n) => {
      const key = n.trim().toLowerCase();
      const skills = new Set();
      listings.filter((l) => l.name.trim().toLowerCase() === key).forEach((l) => skills.add(l.offered));
      const projects = passport.projects.filter((p) => p.name.trim().toLowerCase() === key);
      const assessments = passport.assessments.filter((a) => a.score >= a.total && a.name.trim().toLowerCase() === key);
      assessments.forEach((a) => skills.add(a.skill));
      return { name: n, skills: Array.from(skills), projectCount: projects.length, stat: ratingStatsByName[key] };
    });
  }, [allNames, listings, passport, ratingStatsByName]);

  const filtered = useMemo(() => {
    const query = q.trim().toLowerCase();
    if (!query) return profiles;
    return profiles.filter((p) => p.skills.some((s) => s.toLowerCase().includes(query)) || p.name.toLowerCase().includes(query));
  }, [profiles, q]);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "20px" }}>
      <Panel>
        <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "6px" }}><Building2 size={16} color={AMBER} /><span style={{ fontWeight: 800, fontSize: "16px" }}>Hire from the Skill Passport database</span></div>
        <p style={{ color: CHALK_DIM, fontSize: "13px", margin: "0 0 14px" }}>Search by skill to find people who've proven it with real projects and verified assessments — not just a certificate.</p>
        <div style={{ display: "flex", alignItems: "center", gap: "10px" }}><Search size={16} color={CHALK_DIM} /><input style={{ ...inputStyle, flex: 1 }} placeholder="Search skill — e.g. Python, guitar, welding" value={q} onChange={(e) => setQ(e.target.value)} /></div>
      </Panel>

      {filtered.length === 0 ? (
        <Panel><span style={{ fontSize: "13px", color: CHALK_DIM }}>No matching talent yet.</span></Panel>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: "12px" }}>
          {filtered.map((p) => (
            <div key={p.name} style={{ background: SURFACE, border: `1px solid ${BORDER}`, borderRadius: "16px", padding: "20px", display: "flex", flexDirection: "column", gap: "8px" }}>
              <span style={{ fontWeight: 600, fontSize: "14px" }}>{p.name}</span>
              {p.stat && <span style={{ display: "flex", alignItems: "center", gap: "4px", fontSize: "11px", color: CHALK_DIM }}><Star size={11} color={AMBER} fill={AMBER} />{p.stat.avg.toFixed(1)} · {p.stat.count} swaps</span>}
              <div style={{ display: "flex", flexWrap: "wrap", gap: "5px" }}>
                {p.skills.length === 0 ? <span style={{ fontSize: "12px", color: CHALK_DIM }}>No skills tracked yet</span> : p.skills.slice(0, 5).map((s) => (
                  <span key={s} style={{ fontSize: "11px", fontFamily: "'Space Mono', monospace", color: SAGE, border: `1px solid ${SAGE}55`, background: `${SAGE}15`, borderRadius: "999px", padding: "2px 8px" }}>{s}</span>
                ))}
              </div>
              <span style={{ fontSize: "12px", color: AMBER, fontFamily: "'Space Mono', monospace" }}>{p.projectCount} project{p.projectCount === 1 ? "" : "s"} proven</span>
              <button onClick={() => onView(p.name)} style={{ alignSelf: "flex-start", marginTop: "4px", fontSize: "12px", background: "transparent", border: `1px solid ${BORDER}`, color: CHALK, borderRadius: "12px", padding: "5px 12px", cursor: "pointer" }}>View passport</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById("root")).render(<SkillSwap />);
  </script>
</body>
