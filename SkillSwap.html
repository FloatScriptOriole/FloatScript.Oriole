function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return "just now";
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  const d = Math.floor(h / 24);
  return `${d}d ago`;
}

function related(a, b) {
  if (!a || !b) return false;
  const x = a.trim().toLowerCase();
  const y = b.trim().toLowerCase();
  if (!x || !y) return false;
  return x.includes(y) || y.includes(x);
}

const HASH_ITERATIONS = 3000;

async function sha256Hex(str) {
  const enc = new TextEncoder().encode(str);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, "0")).join("");
}

function randomSaltHex(len = 16) {
  const arr = crypto.getRandomValues(new Uint8Array(len));
  return Array.from(arr).map((b) => b.toString(16).padStart(2, "0")).join("");
}

// poor-man's key stretching: iterated salted SHA-256 (not real PBKDF2/bcrypt/argon2,
// but far more brute-force-resistant than a single hash)
async function stretchHash(pin, salt) {
  let val = `${salt}:${pin}`;
  for (let i = 0; i < HASH_ITERATIONS; i++) {
    val = await sha256Hex(val + salt);
  }
  return val;
}

// Rule-based: keyword matching + a small canned knowledge base. It's not a

const QUIZ_BANK = [

  { skill: "Python", question: "Which keyword starts a loop in Python?", options: ["for", "then", "loop", "do"], correct: 0 },

  { skill: "Guitar", question: "Standard guitar tuning, low to high, is:", options: ["E A D G B E", "E A D G B D", "D A D G B E", "E A D G C E"], correct: 0 },
  { skill: "General", question: "What generally helps a new skill stick best?", options: ["Spaced repetition & practice", "Reading about it once", "Watching videos passively", "Cramming right before you need it"], correct: 0 },

const EXPLANATIONS = [
  { match: "loop", text: "A loop repeats a block of code until a condition stops it. A for-loop is best when you know how many times to repeat (like going through a list); a while-loop is best when you're repeating until something becomes true." },
  { match: "function", text: "A function is a named, reusable block of code that takes inputs and (usually) returns an output. Writing one is how you stop copy-pasting the same logic everywhere." },
  { match: "chord", text: "A chord is 3+ notes played together. Open chords (like G, C, D) use some open strings and are usually taught first because they don't require holding down every string." },
  { match: "tuning", text: "Standard guitar tuning is E-A-D-G-B-E from the thickest string to the thinnest. Everything else — chord shapes, scales — is built on top of that reference." },
  { match: "variable", text: "A variable is a named container for a value that can change. Think of it as a labeled box — you can look at what's inside, or put something new in." },
  { match: "practice", text: "Deliberate practice beats passive exposure: short, focused sessions on the exact thing you're weak at, with feedback, beat long unfocused sessions every time." },

function localExplain(topicRaw) {
  const topic = (topicRaw || "").toLowerCase();
  const found = EXPLANATIONS.find((e) => topic.includes(e.match));
  if (found) return found.text;
  return "Tell me a specific topic — like \"explain loops\" or \"explain chords\" — and I'll break down what's in my local knowledge base. I only know a handful of topics since I'm not a connected AI model, just local logic.";
}

function localMentorReply(userText, ctx, pendingQuiz) {
  const t = userText.trim().toLowerCase();

  // answering a pending quiz question
  if (pendingQuiz) {
    const choice = parseInt(t, 10);
    if (!Number.isNaN(choice) && choice >= 1 && choice <= pendingQuiz.options.length) {
      const correct = choice - 1 === pendingQuiz.correct;
      return { text: correct ? "Correct! Nice work." : `Not quite — the answer was "${pendingQuiz.options[pendingQuiz.correct]}". Want another?`, clearsPending: true };
    }
    return { text: `Reply with a number 1–${pendingQuiz.options.length} to answer, or ask me something else.` };
  }

  if (t.includes("quiz")) {
    const targetSkill = ctx.weakSkills[0] || ctx.allSkills[0];
    const filtered = targetSkill ? QUIZ_BANK.filter((q) => related(q.skill, targetSkill)) : [];
    const bank = filtered.length ? filtered : QUIZ_BANK;
    const q = bank[Math.floor(Math.random() * bank.length)];
    return { text: `Quick quiz on ${q.skill}:\n${q.question}\n${q.options.map((o, i) => `${i + 1}. ${o}`).join("   ")}\nReply with the number.`, newPending: q };
  }

  if (t.includes("study next") || t.includes("what should i") || t.includes("next")) {
    if (ctx.weakSkills.length) return { text: `Your assessments show a missed checkpoint in ${ctx.weakSkills[0]} — worth retaking that lesson in the Learn tab before moving on.` };
    if (ctx.allSkills.length) return { text: `Nothing tracked as weak yet. Since ${ctx.allSkills[0]} is active on the board, building a small project in it is a solid next step toward a verified assessment.` };
    return { text: "Post a listing on the Board or try a lesson in Learn first — once there's something tracked, I can point you toward what's next." };
  }

  if (t.includes("explain")) {
    const topic = userText.replace(/.*explain/i, "").trim() || ctx.weakSkills[0] || ctx.allSkills[0] || "";
    return { text: localExplain(topic) };
  }

  return { text: "I can quiz you, suggest what to study next, or explain a topic from my local knowledge base — try one of the buttons below, or type \"explain loops\"." };
}

// Local, template-based Skill Passport summary — no external API. Builds a
// concrete sentence from the person's actual data instead of a generic model
// call, which also means it's instant and free.
// ---------------------------------------------------------------------------
function generateLocalSummary({ name, skillsMastered, projects, assessments, endorsements, rating }) {
  if (!skillsMastered.length && !projects.length && !assessments.length) return "Not enough data yet to generate a summary.";
  const parts = [];
  if (skillsMastered.length) parts.push(`${name} has hands-on experience in ${skillsMastered.slice(0, 4).join(", ")}`);
  if (projects.length) parts.push(`with ${projects.length} completed project${projects.length > 1 ? "s" : ""}${projects[0] ? `, including "${projects[0].title}"` : ""}`);
  const verified = assessments.filter((a) => a.score >= a.total);
  if (verified.length) parts.push(`${verified.length} verified assessment${verified.length > 1 ? "s" : ""} confirming proficiency in ${Array.from(new Set(verified.map((a) => a.skill))).join(", ")}`);
  if (rating) parts.push(`rated ${rating.avg.toFixed(1)}★ across ${rating.count} completed swap${rating.count > 1 ? "s" : ""} on the platform`);
  if (endorsements.length) parts.push(`endorsed by a peer: "${endorsements[0]}"`);
  return parts.join(". ") + ".";
}

// find 3-way chains: me -> teacher1 -> teacher2 -> back to me
function findChains(listing, listings, directMatchIds) {
  const chains = [];
  const step1 = listings.filter((m) => m.id !== listing.id && related(m.offered, listing.wanted) && !directMatchIds.has(m.id));
  for (const m of step1) {
    const step2 = listings.filter((n) => n.id !== listing.id && n.id !== m.id && related(n.offered, m.wanted) && related(listing.offered, n.wanted));
    for (const n of step2) {
      chains.push([listing, m, n]);
      if (chains.length >= 3) return chains;
    }
  }
  return chains;
}

}

    function Ticker({ items }) {
      if (items.length === 0) return null;
      const loop = [...items, ...items];
      return (
        <div style={{ borderTop: `1px solid ${BORDER}`, borderBottom: `1px solid ${BORDER}`, background: SURFACE, overflow: "hidden", whiteSpace: "nowrap" }} aria-hidden="true">

function SkillSwap() {
  useFonts();

  const [tab, setTab] = useState("board");
  const [listings, setListings] = useState([]);
  const [ratings, setRatings] = useState([]);
  const [passport, setPassport] = useState({ projects: [], assessments: [], endorsements: [] });
  const [ledger, setLedger] = useState([]);
  const [bankOffers, setBankOffers] = useState([]);
  const [projectsBoard, setProjectsBoard] = useState([]);
  const [noShowReports, setNoShowReports] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [storageError, setStorageError] = useState(false);

  const [displayName, setDisplayName] = useState("");
  const [nameDraft, setNameDraft] = useState("");
  const [passportTarget, setPassportTarget] = useState("");

  const [authCreds, setAuthCreds] = useState({});
  const [authMode, setAuthMode] = useState(null); // null | 'create' | 'unlock'
  const [pendingClaim, setPendingClaim] = useState("");
  const [pin, setPin] = useState("");
  const [pin2, setPin2] = useState("");
  const [authError, setAuthError] = useState("");
  const [authBusy, setAuthBusy] = useState(false);
  const [lockTick, setLockTick] = useState(0);

  useEffect(() => {
    const unsubs = [];
    try {
      // Real-time listener: listings
      unsubs.push(
        onSnapshot(query(collection(db, "listings"), orderBy("ts", "desc")), (snap) => {
          const data = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
          setListings(data);
          setLoading(false);
        }, () => { setListings([]); setLoading(false); })
      );

      // Real-time listener: ratings
      unsubs.push(
        onSnapshot(query(collection(db, "ratings"), orderBy("ts", "desc")), (snap) => {
          setRatings(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
        }, () => setRatings([]))
      );

      // Real-time listener: passport data (single doc per user, or a collection)
      unsubs.push(
        onSnapshot(doc(db, "passport", "data"), (d) => {
          if (d.exists()) setPassport(d.data());
        }, () => {})
      );

      // Real-time listener: credits ledger
      unsubs.push(
        onSnapshot(query(collection(db, "ledger"), orderBy("ts", "desc")), (snap) => {
          setLedger(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
        }, () => setLedger([]))
      );

      // Real-time listener: bank offers
      unsubs.push(
        onSnapshot(query(collection(db, "bank_offers"), orderBy("ts", "desc")), (snap) => {
          setBankOffers(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
        }, () => setBankOffers([]))
      );

      // Real-time listener: community projects
      unsubs.push(
        onSnapshot(query(collection(db, "community_projects"), orderBy("ts", "desc")), (snap) => {
          setProjectsBoard(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
        }, () => setProjectsBoard([]))
      );

      // Real-time listener: no-show reports
      unsubs.push(
        onSnapshot(query(collection(db, "no_show_reports"), orderBy("ts", "desc")), (snap) => {
          setNoShowReports(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
        }, () => setNoShowReports([]))
      );

      // Auth credentials — keep in localStorage (client-side only, not synced)
      try {
        const authRaw = localStorage.getItem("ss_auth_credentials");
        if (authRaw) setAuthCreds(JSON.parse(authRaw));
      } catch (e) {}

      // Display name — keep in localStorage
      const dn = localStorage.getItem("ss_displayName");
      if (dn) setDisplayName(dn);
    } catch (e) {
      setListings([]);
    }

    return () => unsubs.forEach((u) => u());
  }, []);

  // ---- Firestore persist functions ----
  async function persistListings(next) {
    setSaving(true);
    setStorageError(false);
    try {
      // Find new items and add them
      const existingIds = new Set();
      const snap = await getDocs(collection(db, "listings"));
      snap.forEach((d) => existingIds.add(d.id));
      for (const item of next) {
        if (!existingIds.has(item.id)) {
          await addDoc(collection(db, "listings"), { ...item });
        }
      }
      // Delete removed items
      for (const d of snap.docs) {
        if (!next.find((n) => n.id === d.id)) {
          await deleteDoc(doc(db, "listings", d.id));
        }
      }
    } catch (e) {
      setStorageError(true);
    } finally {
      setSaving(false);
    }
  }

  async function persistRatings(next) {
    try {
      const existingIds = new Set();
      const snap = await getDocs(collection(db, "ratings"));
      snap.forEach((d) => existingIds.add(d.id));
      for (const item of next) {
        if (!existingIds.has(item.id)) {
          await addDoc(collection(db, "ratings"), { ...item });
        }
      }
    } catch (e) {}
  }

  async function persistPassport(next) {
    try {
      await setDoc(doc(db, "passport", "data"), next);
    } catch (e) {}
  }

  async function persistLedger(next) {
    try {
      const existingIds = new Set();
      const snap = await getDocs(collection(db, "ledger"));
      snap.forEach((d) => existingIds.add(d.id));
      for (const item of next) {
        if (!existingIds.has(item.id)) {
          await addDoc(collection(db, "ledger"), { ...item });
        }
      }
      // Update status changes
      for (const d of snap.docs) {
        const updated = next.find((n) => n.id === d.id);
        if (updated && updated.status !== d.data().status) {
          await updateDoc(doc(db, "ledger", d.id), { status: updated.status });
        }
      }
    } catch (e) {}
  }

  async function persistBankOffers(next) {
    try {
      const existingIds = new Set();
      const snap = await getDocs(collection(db, "bank_offers"));
      snap.forEach((d) => existingIds.add(d.id));
      for (const item of next) {
        if (!existingIds.has(item.id)) {
          await addDoc(collection(db, "bank_offers"), { ...item });
        }
      }
    } catch (e) {}
  }

  async function persistProjectsBoard(next) {
    try {
      const existingIds = new Set();
      const snap = await getDocs(collection(db, "community_projects"));
      snap.forEach((d) => existingIds.add(d.id));
      for (const item of next) {
        if (!existingIds.has(item.id)) {
          await addDoc(collection(db, "community_projects"), { ...item });
        } else {
          // Update status changes (claimed, done)
          const old = snap.docs.find((d) => d.id === item.id);
          if (old && (old.data().status !== item.status || old.data().claimedBy !== item.claimedBy)) {
            await updateDoc(doc(db, "community_projects", item.id), { status: item.status, claimedBy: item.claimedBy });
          }
        }
      }
    } catch (e) {}
  }

  async function persistNoShow(next) {
    try {
      const existingIds = new Set();
      const snap = await getDocs(collection(db, "no_show_reports"));
      snap.forEach((d) => existingIds.add(d.id));
      for (const item of next) {
        if (!existingIds.has(item.id)) {
          await addDoc(collection(db, "no_show_reports"), { ...item });
        }
      }
    } catch (e) {}
  }

  async function saveDisplayName(n) {
    setDisplayName(n);
    try { localStorage.setItem("ss_displayName", n); } catch (e) {}
  }

  async function persistAuthCreds(next) {
    try { localStorage.setItem("ss_auth_credentials", JSON.stringify(next)); } catch (e) {}
  }

  function lockSecondsLeft(cred) {
    if (!cred || !cred.lockUntil) return 0;
    return Math.max(0, Math.ceil((cred.lockUntil - Date.now()) / 1000));
  }

  // tick once a second while a locked-out unlock panel is open, so the countdown updates
  useEffect(() => {
    if (authMode !== "unlock") return;
    const cred = authCreds[pendingClaim.trim().toLowerCase()];
    if (!cred || lockSecondsLeft(cred) <= 0) return;
    const t = setInterval(() => setLockTick((x) => x + 1), 1000);
    return () => clearInterval(t);
  }, [authMode, pendingClaim, authCreds]);

  function attemptClaim(rawName) {
    const trimmed = rawName.trim();
    if (!trimmed) return;
    if (displayName && trimmed.toLowerCase() === displayName.trim().toLowerCase()) return;
    setAuthError("");
    setPin("");
    setPin2("");
    setPendingClaim(trimmed);
    const key = trimmed.toLowerCase();
    setAuthMode(authCreds[key] ? "unlock" : "create");
  }

  async function submitCreate(e) {
    e.preventDefault();
    setAuthError("");
    if (pin.length < PIN_MIN_LEN) { setAuthError(`Passphrase must be at least ${PIN_MIN_LEN} characters.`); return; }
    if (pin !== pin2) { setAuthError("Passphrases don't match."); return; }
    setAuthBusy(true);
    try {
      const salt = randomSaltHex();
      const hash = await stretchHash(pin, salt);
      const key = pendingClaim.trim().toLowerCase();
      const next = { ...authCreds, [key]: { salt, hash, attempts: 0, lockUntil: 0, displayCase: pendingClaim.trim() } };
      setAuthCreds(next);
      await persistAuthCreds(next);
      await saveDisplayName(pendingClaim.trim());
      setAuthMode(null); setPendingClaim(""); setPin(""); setPin2(""); setNameDraft("");
    } catch (e) {
      setAuthError("Couldn't create that claim right now — try again.");
    } finally {
      setAuthBusy(false);
    }
  }

  async function submitUnlock(e) {
    e.preventDefault();
    setAuthError("");
    const key = pendingClaim.trim().toLowerCase();
    const cred = authCreds[key];
    if (!cred) return;
    const secsLeft = lockSecondsLeft(cred);
    if (secsLeft > 0) { setAuthError(`Too many attempts — try again in ${secsLeft}s.`); return; }
    setAuthBusy(true);
    try {
      const hash = await stretchHash(pin, cred.salt);
      if (hash === cred.hash) {
        const next = { ...authCreds, [key]: { ...cred, attempts: 0, lockUntil: 0 } };
        setAuthCreds(next);
        await persistAuthCreds(next);
        await saveDisplayName(cred.displayCase || pendingClaim.trim());
        setAuthMode(null); setPendingClaim(""); setPin(""); setPin2(""); setNameDraft("");
      } else {
        const attempts = (cred.attempts || 0) + 1;
        let lockUntil = 0;
        if (attempts >= LOCK_THRESHOLD) {
          const backoff = Math.min(LOCK_BASE_SECONDS * Math.pow(2, attempts - LOCK_THRESHOLD), LOCK_MAX_SECONDS);
          lockUntil = Date.now() + backoff * 1000;
        }
        const next = { ...authCreds, [key]: { ...cred, attempts, lockUntil } };
        setAuthCreds(next);
        await persistAuthCreds(next);
        setAuthError(lockUntil ? `Wrong passphrase. Locked for ${Math.ceil((lockUntil - Date.now()) / 1000)}s.` : `Wrong passphrase. ${LOCK_THRESHOLD - attempts} attempt(s) left before a lockout.`);
      }
    } catch (e) {
      setAuthError("Couldn't verify that right now — try again.");
    } finally {
      setAuthBusy(false);
    }
  }

  function cancelAuth() {
    setAuthMode(null); setPendingClaim(""); setPin(""); setPin2(""); setAuthError(""); setNameDraft("");
  }

  async function logout() {
    setDisplayName("");
    setNameDraft("");
    try { localStorage.removeItem("ss_displayName"); } catch (e) {}
  }

  const ratingStatsByName = useMemo(() => {
    const map = {};
    for (const r of ratings) {
      const key = r.aboutName.trim().toLowerCase();
      if (!map[key]) map[key] = { sum: 0, count: 0 };
      map[key].sum += r.stars;
      map[key].count += 1;
    }
    const out = {};
    for (const k in map) out[k] = { avg: map[k].sum / map[k].count, count: map[k].count };
    return out;
  }, [ratings]);

  const allNames = useMemo(() => {
    const set = new Set();
    listings.forEach((l) => set.add(l.name.trim()));
    passport.projects.forEach((p) => set.add(p.name.trim()));
    passport.assessments.forEach((a) => set.add(a.name.trim()));
    bankOffers.forEach((b) => set.add(b.name.trim()));
    return Array.from(set).filter(Boolean);
  }, [listings, passport, bankOffers]);

  function creditsFor(name) {
    const key = name.trim().toLowerCase();
    if (!key) return { balance: STARTING_CREDITS, held: 0 };
    let earned = 0, spentReleased = 0, held = 0;
    for (const e of ledger) {
      const from = e.from.trim().toLowerCase();
      const to = e.to.trim().toLowerCase();
      if (e.status === "released") {
        if (to === key) earned += e.hours;
        if (from === key) spentReleased += e.hours;
      } else if (e.status === "held" || e.status === "disputed") {
        if (from === key) held += e.hours;
      }
    }
    return { balance: STARTING_CREDITS + earned - spentReleased - held, held };
  }

      const nameBadge = (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: "8px" }}>

            {displayName ? (
              <>
                <span style={{ ...inputStyle, padding: "6px 14px", fontSize: "13px", width: "160px", display: "inline-block", color: INK, fontWeight: 600 }}>{displayName}</span>
                <span style={{ display: "flex", alignItems: "center", gap: "5px", fontSize: "13px", color: AMBER, fontFamily: "'Nunito', sans-serif", fontWeight: 700 }}><Coins size={14} /> {creditsFor(displayName).balance.toFixed(1)}h</span>
                <button onClick={logout} title="Log out" style={{ background: "transparent", border: `1.5px solid ${BORDER}`, color: CHALK_DIM, borderRadius: "9999px", padding: "6px 8px", cursor: "pointer", display: "flex", alignItems: "center", transition: "all 200ms" }}><LogOut size={14} /></button>

            <input type="password" autoFocus placeholder={authMode === "create" ? `Set a passphrase (min ${PIN_MIN_LEN} chars)` : "Enter your passphrase"} value={pin} onChange={(e) => setPin(e.target.value)} style={{ ...inputStyle, padding: "8px 14px", fontSize: "13px", height: "38px" }} />
            {authMode === "create" && (
              <input type="password" placeholder="Confirm passphrase" value={pin2} onChange={(e) => setPin2(e.target.value)} style={{ ...inputStyle, padding: "8px 14px", fontSize: "13px", height: "38px" }} />
            )}
            {authError && <span style={{ fontSize: "12px", color: ROSE, fontWeight: 600 }}>{authError}</span>}
            <div style={{ display: "flex", gap: "8px" }}>
              <button type="submit" disabled={authBusy} style={{ background: AMBER, color: "#FFFFFF", border: "none", borderRadius: "9999px", padding: "8px 18px", fontSize: "13px", fontWeight: 700, cursor: "pointer", opacity: authBusy ? 0.6 : 1, transition: "all 200ms", boxShadow: "0 2px 8px rgba(189,106,40,0.3)" }}>{authBusy ? "Checking…" : authMode === "create" ? "Claim name" : "Unlock"}</button>
              <button type="button" onClick={cancelAuth} style={{ background: "transparent", border: `1.5px solid ${BORDER}`, color: CHALK_DIM, borderRadius: "9999px", padding: "8px 18px", fontSize: "13px", fontWeight: 600, cursor: "pointer", transition: "all 200ms" }}>Cancel</button>
            </div>
          </form>
          <p style={{ fontSize: "11px", color: CHALK_DIM, margin: 0, lineHeight: 1.5 }}>
            Lightweight name lock — passphrases are salted &amp; hashed client-side, with lockout after {LOCK_THRESHOLD} failed tries.
          </p>
        </div>
      )}
    </div>
  );


      return (
        <div style={{ minHeight: "100vh", background: "#17130F", color: CHALK, fontFamily: "'Nunito', sans-serif", animation: "fadeIn 400ms ease" }}>

        <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", marginTop: "20px" }}>
          <TabButton active={tab === "board"} onClick={() => setTab("board")} icon={<ArrowLeftRight size={13} />} label="Board" />
          <TabButton active={tab === "bank"} onClick={() => setTab("bank")} icon={<Coins size={13} />} label="Time Bank" />
          <TabButton active={tab === "projects"} onClick={() => setTab("projects")} icon={<Trophy size={13} />} label="Projects" />
          <TabButton active={tab === "learn"} onClick={() => setTab("learn")} icon={<GraduationCap size={13} />} label="Learn" />
          <TabButton active={tab === "passport"} onClick={() => setTab("passport")} icon={<Briefcase size={13} />} label="Skill Passport" />
          <TabButton active={tab === "hire"} onClick={() => setTab("hire")} icon={<Building2 size={13} />} label="Hire" />
        </div>
      </div>

          {tab === "board" && <div style={{ marginTop: "24px" }}><Ticker items={listings.slice(0, 8)} /></div>}

          <div style={{ maxWidth: "960px", margin: "0 auto", padding: "32px 24px 80px" }}>
        {tab === "board" && (
          <BoardTab
            listings={listings} setListings={setListings} persistListings={persistListings}
            saving={saving} storageError={storageError} loading={loading}
            ratingStatsByName={ratingStatsByName} ratings={ratings} setRatings={setRatings} persistRatings={persistRatings}
            displayName={displayName}
            noShowReports={noShowReports} setNoShowReports={setNoShowReports} persistNoShow={persistNoShow}
          />
        )}
        {tab === "bank" && (
          <BankTab
            displayName={displayName} bankOffers={bankOffers} setBankOffers={setBankOffers} persistBankOffers={persistBankOffers}
            ledger={ledger} setLedger={setLedger} persistLedger={persistLedger} creditsFor={creditsFor}
          />
        )}
        {tab === "projects" && (
          <ProjectsTab
            displayName={displayName} projectsBoard={projectsBoard} setProjectsBoard={setProjectsBoard} persistProjectsBoard={persistProjectsBoard}
            passport={passport} setPassport={setPassport} persistPassport={persistPassport}
            ledger={ledger} setLedger={setLedger} persistLedger={persistLedger}
          />
        )}
        {tab === "learn" && (
          <LearnTab displayName={displayName} passport={passport} setPassport={setPassport} persistPassport={persistPassport} allSkills={listings.map((l) => l.offered)} />
        )}
        {tab === "passport" && (
          <PassportTab
            listings={listings} ratings={ratings} ratingStatsByName={ratingStatsByName}
            passport={passport} setPassport={setPassport} persistPassport={persistPassport}
            displayName={displayName} allNames={allNames} jumpToName={passportTarget}
            creditsFor={creditsFor} noShowReports={noShowReports} ledger={ledger}
          />
        )}
        {tab === "hire" && (
          <HireTab
            allNames={allNames} listings={listings} passport={passport} ratingStatsByName={ratingStatsByName}
            onView={(n) => { setPassportTarget(n); setTab("passport"); }}
          />
        )}
      </div>

          <div style={{ textAlign: "center", padding: "0 24px 32px", color: CHALK_DIM, fontSize: "13px", fontWeight: 500 }}>
            Listings, messages, ratings, credits, and passports are visible to everyone — no login, no money, just trades.
          </div>
    </div>
  );
}

// ============================== BOARD TAB ==============================

function BoardTab({ listings, setListings, persistListings, saving, storageError, loading, ratingStatsByName, ratings, setRatings, persistRatings, displayName, noShowReports, setNoShowReports, persistNoShow }) {
  const [search, setSearch] = useState("");
  const [activeCategory, setActiveCategory] = useState("all");
  const [expanded, setExpanded] = useState(null);

  const [offered, setOffered] = useState("");
  const [wanted, setWanted] = useState("");
  const [hours, setHours] = useState(2);
  const [note, setNote] = useState("");
  const [category, setCategory] = useState(CATEGORIES[0].id);
  const [formError, setFormError] = useState("");

  const [chatOpenFor, setChatOpenFor] = useState(null);
  const [chatCache, setChatCache] = useState({});
  const [chatLoading, setChatLoading] = useState(false);
  const [chatInput, setChatInput] = useState("");
  const [chatSending, setChatSending] = useState(false);

  const [ratingOpenFor, setRatingOpenFor] = useState(null);
  const [ratingStars, setRatingStars] = useState(5);
  const [ratingComment, setRatingComment] = useState("");
  const [ratingSubmitting, setRatingSubmitting] = useState(false);
  const [ratedConvos, setRatedConvos] = useState({});

  const [sessionOpenFor, setSessionOpenFor] = useState(null);
  const [sessionCache, setSessionCache] = useState({});
  const [sessionLoading, setSessionLoading] = useState(false);
  const [sessionWhen, setSessionWhen] = useState("");
  const [sessionDuration, setSessionDuration] = useState(30);
  const [sessionSaving, setSessionSaving] = useState(false);

  async function handleSubmit(e) {
    e.preventDefault();
    if (!displayName) {
      setFormError("Claim your name at the top of the page first — it stops other people posting as you.");
      return;
    }
    if (!offered.trim() || !wanted.trim()) {
      setFormError("What you offer and what you want are both required.");
      return;
    }
    setFormError("");
    const entry = { id: `l-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`, name: displayName, offered: offered.trim(), wanted: wanted.trim(), hours: Number(hours) || 1, note: note.trim(), category, ts: Date.now() };
    const next = [entry, ...listings];
    setListings(next);
    setOffered(""); setWanted(""); setHours(2); setNote("");
    await persistListings(next);
  }

  async function removeListing(id) {
    const next = listings.filter((l) => l.id !== id);
    setListings(next);
    await persistListings(next);
  }

  const matchesFor = useMemo(() => {
    const map = {};
    for (const l of listings) {
      map[l.id] = listings.filter((o) => o.id !== l.id && related(o.offered, l.wanted) && related(o.wanted, l.offered));
    }
    return map;
  }, [listings]);

  const chainsFor = useMemo(() => {
    const map = {};
    if (listings.length <= 25) {
      for (const l of listings) {
        const directIds = new Set((matchesFor[l.id] || []).map((m) => m.id));
        map[l.id] = findChains(l, listings, directIds);
      }
    }
    return map;
  }, [listings, matchesFor]);

  const visible = useMemo(() => {
    const q = search.trim().toLowerCase();
    return listings.filter((l) => {
      const matchesQuery = !q || l.offered.toLowerCase().includes(q) || l.wanted.toLowerCase().includes(q) || l.name.toLowerCase().includes(q);
      const matchesCategory = activeCategory === "all" || l.category === activeCategory;
      return matchesQuery && matchesCategory;
    });
  }, [listings, search, activeCategory]);

  async function openChat(l, m) {
    const cid = convoId(l.id, m.id);
    setChatOpenFor(chatOpenFor === cid ? null : cid);
    if (chatOpenFor === cid || chatCache[cid]) return;
    setChatLoading(true);
    try {
      const q = query(collection(db, "messages", cid, "msgs"), orderBy("ts"));
      const unsub = onSnapshot(q, (snap) => {
        setChatCache((prev) => ({ ...prev, [cid]: snap.docs.map((d) => ({ id: d.id, ...d.data() })) }));
      });
      // Store unsub for cleanup (simplified — in prod you'd track these)
    } catch (e) {
      setChatCache((prev) => ({ ...prev, [cid]: [] }));
    } finally {
      setChatLoading(false);
    }
  }

  async function sendMessage(cid, senderLabel) {
    if (!chatInput.trim()) return;
    const msg = { from: displayName || senderLabel, text: chatInput.trim(), ts: Date.now() };
    setChatInput("");
    setChatSending(true);
    try {
      await addDoc(collection(db, "messages", cid, "msgs"), msg);
    } catch (e) {}
    finally { setChatSending(false); }
  }

  async function submitRating(cid, aboutName, fromDefaultName) {
    setRatingSubmitting(true);
    const entry = { id: `r-${Date.now()}-${Math.random().toString(36).slice(2, 5)}`, aboutName, fromName: displayName || fromDefaultName, stars: ratingStars, comment: ratingComment.trim(), ts: Date.now() };
    const next = [entry, ...ratings];
    setRatings(next);
    await persistRatings(next);
    setRatedConvos((prev) => ({ ...prev, [cid]: true }));
    setRatingSubmitting(false);
    setRatingOpenFor(null);
    setRatingStars(5);
    setRatingComment("");
  }

  async function openSessions(cid) {
    setSessionOpenFor(sessionOpenFor === cid ? null : cid);
    if (sessionOpenFor === cid || sessionCache[cid]) return;
    setSessionLoading(true);
    try {
      const q = query(collection(db, "sessions", cid, "items"), orderBy("ts", "desc"));
      const unsub = onSnapshot(q, (snap) => {
        setSessionCache((prev) => ({ ...prev, [cid]: snap.docs.map((d) => ({ id: d.id, ...d.data() })) }));
      });
    } catch (e) {
      setSessionCache((prev) => ({ ...prev, [cid]: [] }));
    } finally {
      setSessionLoading(false);
    }
  }

  async function scheduleSession(cid) {
    if (!sessionWhen) return;
    setSessionSaving(true);
    const entry = { when: sessionWhen, duration: Number(sessionDuration) || 30, scheduledBy: displayName || "someone", confirmed: null, ts: Date.now() };
    try {
      await addDoc(collection(db, "sessions", cid, "items"), entry);
    } catch (e) {}
    finally { setSessionSaving(false); setSessionWhen(""); }
  }

  async function confirmSession(cid, sessionEntryId, happened, counterpartName) {
    try {
      await updateDoc(doc(db, "sessions", cid, "items", sessionEntryId), { confirmed: happened });
      if (!happened && counterpartName) {
        await addDoc(collection(db, "no_show_reports"), {
          reportedName: counterpartName,
          reportedBy: displayName || "someone",
          ts: Date.now(),
        });
      }
    } catch (e) {}
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "32px" }}>
      <form onSubmit={handleSubmit} style={{ background: SURFACE, border: `1px solid ${BORDER}`, borderRadius: "16px", padding: "20px", display: "flex", flexDirection: "column", gap: "14px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
          <Plus size={16} color={AMBER} />
          <span style={{ fontWeight: 800, fontSize: "16px" }}>List a swap</span>
        </div>
        <Field label="Posting as">
          {displayName ? (
            <span style={{ fontSize: "13px", color: SAGE }}>{displayName} <span style={{ color: CHALK_DIM, fontSize: "11px" }}>(verified name)</span></span>
          ) : (
            <span style={{ fontSize: "12px", color: ROSE }}>Claim your name at the top of the page to post.</span>
          )}
        </Field>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px" }}>
          <Field label="You offer"><input style={inputStyle} value={offered} onChange={(e) => setOffered(e.target.value)} placeholder="Python tutoring" /></Field>
          <Field label="You want"><input style={inputStyle} value={wanted} onChange={(e) => setWanted(e.target.value)} placeholder="Guitar lessons" /></Field>
        </div>
        <Field label="Category">
          <select style={{ ...inputStyle, appearance: "auto" }} value={category} onChange={(e) => setCategory(e.target.value)}>
            {CATEGORIES.map((c) => <option key={c.id} value={c.id}>{c.label}</option>)}
          </select>
        </Field>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr", gap: "12px" }}>
          <Field label={`Hours offered: ${hours}`}><input type="range" min="1" max="10" value={hours} onChange={(e) => setHours(e.target.value)} style={{ accentColor: AMBER, marginTop: "8px" }} /></Field>
          <Field label="Note (optional)"><input style={inputStyle} value={note} onChange={(e) => setNote(e.target.value)} placeholder="Evenings work best for me" /></Field>
        </div>
        {formError && <p style={{ color: ROSE, fontSize: "13px", margin: 0 }}>{formError}</p>}
        <button type="submit" disabled={saving || !displayName} style={{ alignSelf: "flex-start", background: AMBER, color: INK, border: "none", borderRadius: "9999px", padding: "12px 28px", fontWeight: 700, fontSize: "14px", cursor: saving || !displayName ? "default" : "pointer", display: "flex", alignItems: "center", gap: "8px", opacity: saving || !displayName ? 0.6 : 1 }}>
          {saving ? <Loader2 size={14} className="spin" /> : <ArrowLeftRight size={14} />} {saving ? "Posting…" : "Post to the board"}
        </button>
        {storageError && <p style={{ color: ROSE, fontSize: "12px", margin: 0 }}>Couldn't save that just now — it's showing locally but may not persist. Try again in a moment.</p>}
        <style>{`.spin{animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      </form>

      <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
          <Search size={16} color={CHALK_DIM} />
          <input style={{ ...inputStyle, flex: 1 }} placeholder="Search skills — e.g. photography, Spanish, welding" value={search} onChange={(e) => setSearch(e.target.value)} />
        </div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: "8px" }}>
          <button onClick={() => setActiveCategory("all")} style={pillBtn(activeCategory === "all")}>All</button>
          {CATEGORIES.map((c) => (
            <button key={c.id} onClick={() => setActiveCategory(activeCategory === c.id ? "all" : c.id)} style={{ cursor: "pointer", border: "none", background: "none", padding: 0 }}>
              <span style={{ display: "inline-flex", alignItems: "center", gap: "5px", fontSize: "11px", fontFamily: "'Space Mono', monospace", color: c.color, border: `1px solid ${activeCategory === c.id ? c.color : c.color + "55"}`, background: activeCategory === c.id ? `${c.color}2A` : `${c.color}0D`, borderRadius: "999px", padding: "3px 10px" }}>
                <span style={{ width: "6px", height: "6px", borderRadius: "50%", background: c.color }} />{c.label}
              </span>
            </button>
          ))}
        </div>
      </div>

      <div>
        <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "14px" }}>
          <Sparkles size={16} color={SAGE} />
          <span style={{ fontWeight: 800, fontSize: "16px" }}>The board {listings.length > 0 && <span style={{ color: CHALK_DIM, fontWeight: 400 }}>· {listings.length} listed</span>}</span>
        </div>

        {loading ? (
          <p style={{ color: CHALK_DIM, fontSize: "14px" }}>Loading the board…</p>
        ) : visible.length === 0 ? (
          <div style={{ border: `1px dashed ${BORDER}`, borderRadius: "16px", padding: "32px 24px", textAlign: "center", color: CHALK_DIM, fontSize: "14px" }}>
            {listings.length === 0 ? "The board is empty. Be the first to list a swap." : "No listings match that search or category."}
          </div>
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: "12px" }}>
            {visible.map((l) => {
              const matches = matchesFor[l.id] || [];
              const chains = chainsFor[l.id] || [];
              const isOpen = expanded === l.id;
              const stat = ratingStatsByName[l.name.trim().toLowerCase()];
              return (
                <div key={l.id} style={{ background: SURFACE, border: `1px solid ${matches.length ? SAGE : SURFACE_2}`, borderRadius: "16px", padding: "20px", display: "flex", flexDirection: "column", gap: "10px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div style={{ display: "flex", flexDirection: "column", gap: "3px" }}>
                      <span style={{ fontWeight: 600, fontSize: "14px" }}>{l.name}</span>
                      {stat && <span style={{ display: "flex", alignItems: "center", gap: "4px", fontSize: "11px", color: CHALK_DIM }}><Star size={11} color={AMBER} fill={AMBER} />{stat.avg.toFixed(1)} · {stat.count} swap{stat.count > 1 ? "s" : ""}</span>}
                    </div>
                    <button onClick={() => removeListing(l.id)} aria-label="Remove listing" style={{ background: "none", border: "none", cursor: "pointer", color: CHALK_DIM, padding: 0 }}><X size={14} /></button>
                  </div>

                  <CategoryTag id={l.category} />

                  <div style={{ fontFamily: "'Space Mono', monospace", fontSize: "13px", display: "flex", flexDirection: "column", gap: "4px" }}>
                    <span style={{ color: CHALK }}>offers <span style={{ color: AMBER }}>{l.offered}</span></span>
                    <span style={{ color: CHALK }}>wants <span style={{ color: AMBER }}>{l.wanted}</span></span>
                  </div>

                  {l.note && <p style={{ fontSize: "13px", color: CHALK_DIM, margin: 0 }}>“{l.note}”</p>}

                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: "4px", flexWrap: "wrap", gap: "6px" }}>
                    <span style={{ display: "flex", alignItems: "center", gap: "6px", fontSize: "12px", color: CHALK_DIM }}><Clock size={12} /> {l.hours}h · {timeAgo(l.ts)}</span>
                    <div style={{ display: "flex", gap: "6px" }}>
                      {chains.length > 0 && matches.length === 0 && (
                        <span style={{ display: "flex", alignItems: "center", gap: "4px", background: "rgba(124,147,163,0.18)", color: "#9DB4C4", borderRadius: "999px", padding: "4px 10px", fontSize: "11px" }}><GitBranch size={11} /> chain available</span>
                      )}
                      {matches.length > 0 && (
                        <button onClick={() => setExpanded(isOpen ? null : l.id)} style={{ background: "rgba(127,161,135,0.15)", color: SAGE, border: "none", borderRadius: "999px", padding: "4px 10px", fontSize: "12px", fontWeight: 600, cursor: "pointer" }}>{matches.length} match{matches.length > 1 ? "es" : ""}</button>
                      )}
                    </div>
                  </div>

                  {chains.length > 0 && matches.length === 0 && (
                    <div style={{ fontSize: "11px", color: CHALK_DIM, background: SURFACE_2, borderRadius: "12px", padding: "8px" }}>
                      🔗 {l.name} → {chains[0][1].name} ({chains[0][1].offered}) → {chains[0][2].name} ({chains[0][2].offered}) → back to {l.name}. No direct match, but a 3-way trade would work.
                    </div>
                  )}

                  {isOpen && (
                    <div style={{ borderTop: `1px solid ${BORDER}`, paddingTop: "10px", display: "flex", flexDirection: "column", gap: "12px" }}>
                      {matches.map((m) => {
                        const cid = convoId(l.id, m.id);
                        const isChatOpen = chatOpenFor === cid;
                        const isRatingOpen = ratingOpenFor === cid;
                        const isSessionOpen = sessionOpenFor === cid;
                        const alreadyRated = ratedConvos[cid];
                        const msgs = chatCache[cid] || [];
                        const sessions = sessionCache[cid] || [];
                        return (
                          <div key={m.id} style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                            <div style={{ fontSize: "12px", color: CHALK_DIM }}>
                              <span style={{ color: CHALK }}>{m.name}</span> offers <span style={{ color: AMBER }}>{m.offered}</span> for <span style={{ color: AMBER }}>{m.wanted}</span>
                            </div>
                            <div style={{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
                              <button onClick={() => openChat(l, m)} style={{ display: "flex", alignItems: "center", gap: "6px", background: "transparent", border: `1px solid ${BORDER}`, color: CHALK, borderRadius: "9999px", padding: "6px 14px", fontSize: "13px", cursor: "pointer" }}><MessageCircle size={12} /> {isChatOpen ? "Hide chat" : "Message"}</button>
                              <button onClick={() => openSessions(cid)} style={{ display: "flex", alignItems: "center", gap: "6px", background: "transparent", border: `1px solid ${BORDER}`, color: CHALK, borderRadius: "9999px", padding: "6px 14px", fontSize: "13px", cursor: "pointer" }}><Calendar size={12} /> {isSessionOpen ? "Hide sessions" : "Live session"}</button>
                              <button onClick={() => setRatingOpenFor(isRatingOpen ? null : cid)} disabled={alreadyRated} style={{ display: "flex", alignItems: "center", gap: "6px", background: "transparent", border: `1px solid ${BORDER}`, color: alreadyRated ? CHALK_DIM : CHALK, borderRadius: "9999px", padding: "6px 14px", fontSize: "13px", cursor: alreadyRated ? "default" : "pointer" }}><CheckCircle2 size={12} /> {alreadyRated ? "Rated" : "Mark complete & rate"}</button>
                            </div>

                            {isChatOpen && (
                              <div style={{ background: SURFACE_2, border: `1px solid ${BORDER}`, borderRadius: "12px", padding: "14px", display: "flex", flexDirection: "column", gap: "8px" }}>
                                <div style={{ display: "flex", flexDirection: "column", gap: "6px", maxHeight: "160px", overflowY: "auto" }}>
                                  {chatLoading ? <span style={{ fontSize: "12px", color: CHALK_DIM }}>Loading messages…</span> : msgs.length === 0 ? <span style={{ fontSize: "12px", color: CHALK_DIM }}>No messages yet. Say hello to {m.name}.</span> : msgs.map((msg) => (
                                    <div key={msg.id} style={{ fontSize: "12px" }}><span style={{ color: AMBER, fontWeight: 600 }}>{msg.from}: </span><span style={{ color: CHALK }}>{msg.text}</span></div>
                                  ))}
                                </div>
                                <div style={{ display: "flex", gap: "6px" }}>
                                  <input style={{ ...inputStyle, flex: 1, padding: "7px 10px", fontSize: "12px" }} placeholder={`Message ${m.name}…`} value={chatInput} onChange={(e) => setChatInput(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") sendMessage(cid, l.name); }} />
                                  <button onClick={() => sendMessage(cid, l.name)} disabled={chatSending} style={{ background: AMBER, color: INK, border: "none", borderRadius: "12px", padding: "0 12px", cursor: "pointer", display: "flex", alignItems: "center" }}><Send size={13} /></button>
                                </div>
                              </div>
                            )}

                            {isSessionOpen && (
                              <div style={{ background: SURFACE_2, border: `1px solid ${BORDER}`, borderRadius: "12px", padding: "14px", display: "flex", flexDirection: "column", gap: "10px" }}>
                                {sessionLoading ? (
                                  <span style={{ fontSize: "12px", color: CHALK_DIM }}>Loading sessions…</span>
                                ) : sessions.length === 0 ? (
                                  <span style={{ fontSize: "12px", color: CHALK_DIM }}>No live sessions scheduled yet.</span>
                                ) : (
                                  sessions.map((s) => {
                                    const startMs = new Date(s.when).getTime();
                                    const isPast = Date.now() > startMs + s.duration * 60000;
                                    return (
                                      <div key={s.id} style={{ fontSize: "12px", borderLeft: `2px solid ${AMBER}`, paddingLeft: "8px" }}>
                                        <div>{new Date(s.when).toLocaleString()} · {s.duration} min · scheduled by {s.scheduledBy}</div>
                                        {isPast && s.confirmed === null && (
                                          <div style={{ display: "flex", alignItems: "center", gap: "8px", marginTop: "4px" }}>
                                            <span style={{ color: CHALK_DIM }}>Did this happen?</span>
                                            <button onClick={() => confirmSession(cid, s.id, true, null)} style={{ background: "transparent", border: `1px solid ${SAGE}`, color: SAGE, borderRadius: "12px", padding: "2px 8px", fontSize: "11px", cursor: "pointer" }}>Yes</button>
                                            <button onClick={() => confirmSession(cid, s.id, false, l.name === s.scheduledBy ? m.name : l.name)} style={{ background: "transparent", border: `1px solid ${ROSE}`, color: ROSE, borderRadius: "12px", padding: "2px 8px", fontSize: "11px", cursor: "pointer" }}>No-show</button>
                                          </div>
                                        )}
                                        {s.confirmed === true && <span style={{ color: SAGE }}>✓ Confirmed happened</span>}
                                        {s.confirmed === false && <span style={{ color: ROSE }}>Reported as a no-show</span>}
                                      </div>
                                    );
                                  })
                                )}
                                <div style={{ display: "flex", gap: "6px", flexWrap: "wrap", alignItems: "center" }}>
                                  <input type="datetime-local" style={{ ...inputStyle, padding: "6px 10px", fontSize: "12px" }} value={sessionWhen} onChange={(e) => setSessionWhen(e.target.value)} />
                                  <select style={{ ...inputStyle, padding: "6px 10px", fontSize: "12px", appearance: "auto" }} value={sessionDuration} onChange={(e) => setSessionDuration(e.target.value)}>
                                    <option value={15}>15 min</option><option value={30}>30 min</option><option value={60}>60 min</option>
                                  </select>
                                  <button onClick={() => scheduleSession(cid)} disabled={sessionSaving || !sessionWhen} style={{ background: AMBER, color: INK, border: "none", borderRadius: "12px", padding: "6px 12px", fontSize: "12px", fontWeight: 600, cursor: "pointer" }}>Schedule</button>
                                </div>
                              </div>
                            )}

                            {isRatingOpen && !alreadyRated && (
                              <div style={{ background: SURFACE_2, border: `1px solid ${BORDER}`, borderRadius: "12px", padding: "14px", display: "flex", flexDirection: "column", gap: "8px" }}>
                                <span style={{ fontSize: "12px", color: CHALK_DIM }}>Rate your swap with {m.name}</span>
                                <StarRow value={ratingStars} onChange={setRatingStars} />
                                <input style={{ ...inputStyle, padding: "7px 10px", fontSize: "12px" }} placeholder="Optional comment" value={ratingComment} onChange={(e) => setRatingComment(e.target.value)} />
                                <button onClick={() => submitRating(cid, m.name, l.name)} disabled={ratingSubmitting} style={{ alignSelf: "flex-start", background: AMBER, color: INK, border: "none", borderRadius: "12px", padding: "6px 12px", fontSize: "12px", fontWeight: 600, cursor: "pointer" }}>{ratingSubmitting ? "Submitting…" : "Submit rating"}</button>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function BankTab({ displayName, bankOffers, setBankOffers, persistBankOffers, ledger, setLedger, persistLedger, creditsFor }) {
  const [skill, setSkill] = useState("");
  const [category, setCategory] = useState(CATEGORIES[0].id);
  const [cost, setCost] = useState(1);
  const [desc, setDesc] = useState("");
  const [posting, setPosting] = useState(false);
  const [redeemingId, setRedeemingId] = useState(null);

  const me = displayName.trim().toLowerCase();
  const { balance, held } = creditsFor(displayName || "");

  async function postOffer(e) {
    e.preventDefault();
    if (!displayName || !skill.trim()) return;
    setPosting(true);
    const entry = { id: `b-${Date.now()}`, name: displayName, skill: skill.trim(), category, hoursCost: Number(cost) || 1, description: desc.trim(), ts: Date.now() };
    const next = [entry, ...bankOffers];
    setBankOffers(next);
    await persistBankOffers(next);
    setSkill(""); setDesc(""); setCost(1);
    setPosting(false);
  }

  async function redeem(offer) {
    if (!displayName || redeemingId) return;
    if (offer.name.trim().toLowerCase() === me) return;
    if (balance < offer.hoursCost) return;
    setRedeemingId(offer.id);
    const entry = { id: `t-${Date.now()}`, from: displayName, to: offer.name, hours: offer.hoursCost, skill: offer.skill, note: offer.description, status: "held", ts: Date.now() };
    const next = [entry, ...ledger];
    setLedger(next);
    await persistLedger(next);
    setRedeemingId(null);
  }

  const myBookingsAsPayer = ledger.filter((e) => e.from.trim().toLowerCase() === me);
  const myBookingsToFulfill = ledger.filter((e) => e.to.trim().toLowerCase() === me);

  async function updateLedgerStatus(id, status) {
    const next = ledger.map((e) => (e.id === id ? { ...e, status } : e));
    setLedger(next);
    await persistLedger(next);
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "24px" }}>
      <Panel>
        <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "6px" }}>
          <Coins size={16} color={AMBER} />
          <span style={{ fontWeight: 800, fontSize: "16px" }}>Time Bank</span>
        </div>
        <p style={{ color: CHALK_DIM, fontSize: "13px", margin: "0 0 12px" }}>
          Bank hours instead of needing a perfect match. Teach anyone, earn credits, then spend them on any skill later.
        </p>
        {displayName ? (
          <div style={{ display: "flex", gap: "16px", fontFamily: "'Space Mono', monospace" }}>
            <div><div style={{ fontSize: "22px", color: AMBER, fontWeight: 700 }}>{balance.toFixed(1)}h</div><div style={{ fontSize: "11px", color: CHALK_DIM }}>available balance</div></div>
            <div><div style={{ fontSize: "22px", color: CHALK_DIM, fontWeight: 700 }}>{held.toFixed(1)}h</div><div style={{ fontSize: "11px", color: CHALK_DIM }}>held in escrow</div></div>
          </div>
        ) : (
          <span style={{ fontSize: "12px", color: CHALK_DIM }}>Set your name at the top to see your balance — everyone starts with {STARTING_CREDITS}h.</span>
        )}
      </Panel>

      <Panel>
        <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "10px" }}><Plus size={15} color={AMBER} /><span style={{ fontWeight: 600, fontSize: "14px" }}>Offer a skill for credits</span></div>
        <form onSubmit={postOffer} style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
          <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr", gap: "8px" }}>
            <input style={inputStyle} placeholder="Skill — e.g. Excel modeling" value={skill} onChange={(e) => setSkill(e.target.value)} />
            <select style={{ ...inputStyle, appearance: "auto" }} value={category} onChange={(e) => setCategory(e.target.value)}>
              {CATEGORIES.map((c) => <option key={c.id} value={c.id}>{c.label}</option>)}
            </select>
            <input type="number" min="1" max="10" style={inputStyle} value={cost} onChange={(e) => setCost(e.target.value)} placeholder="Hours" />
          </div>
          <input style={inputStyle} placeholder="Description (optional)" value={desc} onChange={(e) => setDesc(e.target.value)} />
          <button type="submit" disabled={posting || !displayName} style={{ alignSelf: "flex-start", background: AMBER, color: INK, border: "none", borderRadius: "9999px", padding: "10px 22px", fontSize: "14px", fontWeight: 700, cursor: "pointer", opacity: displayName ? 1 : 0.6 }}>{posting ? "Posting…" : "Post to Time Bank"}</button>
        </form>
      </Panel>

      <Panel>
        <div style={{ fontWeight: 600, fontSize: "14px", marginBottom: "10px" }}>Open offers</div>
        {bankOffers.length === 0 ? <span style={{ fontSize: "13px", color: CHALK_DIM }}>No offers yet.</span> : (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: "12px" }}>
            {bankOffers.map((o) => {
              const isMine = o.name.trim().toLowerCase() === me;
              return (
                <div key={o.id} style={{ background: SURFACE_2, border: `1px solid ${BORDER}`, borderRadius: "12px", padding: "12px", display: "flex", flexDirection: "column", gap: "6px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ fontWeight: 600, fontSize: "13px" }}>{o.skill}</span><span style={{ color: AMBER, fontFamily: "'Space Mono', monospace", fontSize: "13px" }}>{o.hoursCost}h</span></div>
                  <CategoryTag id={o.category} small />
                  {o.description && <span style={{ fontSize: "12px", color: CHALK_DIM }}>{o.description}</span>}
                  <span style={{ fontSize: "11px", color: CHALK_DIM }}>by {o.name}</span>
                  {!isMine && (
                    <button onClick={() => redeem(o)} disabled={!displayName || balance < o.hoursCost || redeemingId === o.id} style={{ marginTop: "4px", background: "transparent", border: `1px solid ${AMBER}`, color: AMBER, borderRadius: "12px", padding: "6px 10px", fontSize: "12px", cursor: "pointer", opacity: !displayName || balance < o.hoursCost ? 0.5 : 1 }}>
                      {redeemingId === o.id ? "Booking…" : !displayName ? "Set your name" : balance < o.hoursCost ? "Not enough credits" : "Redeem"}
                    </button>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </Panel>

      {displayName && (myBookingsAsPayer.length > 0 || myBookingsToFulfill.length > 0) && (
        <Panel>
          <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "10px" }}><ShieldCheck size={15} color={SAGE} /><span style={{ fontWeight: 600, fontSize: "14px" }}>My bookings &amp; escrow</span></div>
          {myBookingsToFulfill.length > 0 && (
            <div style={{ marginBottom: "12px" }}>
              <div style={{ fontSize: "12px", color: CHALK_DIM, marginBottom: "6px" }}>Bookings to fulfill (you teach)</div>
              {myBookingsToFulfill.map((e) => (
                <div key={e.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: "12px", padding: "6px 0", borderTop: `1px solid ${BORDER}` }}>
                  <span>{e.from} booked <span style={{ color: AMBER }}>{e.skill}</span> · {e.hours}h · <span style={{ color: e.status === "held" ? AMBER : e.status === "disputed" ? ROSE : SAGE }}>{e.status}</span></span>
                  {e.status === "held" && <button onClick={() => updateLedgerStatus(e.id, "released")} style={{ background: "transparent", border: `1px solid ${SAGE}`, color: SAGE, borderRadius: "9999px", padding: "4px 12px", fontSize: "12px", cursor: "pointer" }}>Mark delivered</button>}
                </div>
              ))}
            </div>
          )}
          {myBookingsAsPayer.length > 0 && (
            <div>
              <div style={{ fontSize: "12px", color: CHALK_DIM, marginBottom: "6px" }}>Your bookings (you're learning)</div>
              {myBookingsAsPayer.map((e) => (
                <div key={e.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: "12px", padding: "6px 0", borderTop: `1px solid ${BORDER}` }}>
                  <span>{e.to} teaching <span style={{ color: AMBER }}>{e.skill}</span> · {e.hours}h · <span style={{ color: e.status === "held" ? AMBER : e.status === "disputed" ? ROSE : SAGE }}>{e.status}</span></span>
                  {e.status === "held" && <button onClick={() => updateLedgerStatus(e.id, "disputed")} style={{ display: "flex", alignItems: "center", gap: "4px", background: "transparent", border: `1px solid ${ROSE}`, color: ROSE, borderRadius: "9999px", padding: "4px 12px", fontSize: "12px", cursor: "pointer" }}><AlertTriangle size={11} /> Dispute</button>}
                  {e.status === "disputed" && <button onClick={() => updateLedgerStatus(e.id, "refunded")} style={{ background: "transparent", border: `1px solid ${BORDER}`, color: CHALK, borderRadius: "9999px", padding: "4px 12px", fontSize: "12px", cursor: "pointer" }}>Withdraw dispute (refund)</button>}
                </div>
              ))}
            </div>
          )}
        </Panel>
      )}
    </div>
  );
}
